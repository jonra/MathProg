<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathProg Editor — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">
  <header>
    <div class="header-left">
      <h1>mathprog-editor</h1>
      <p class="subtitle">CodeMirror 6 extension for MathProg/GMPL with live math rendering</p>
    </div>
    <div id="theme-palette" class="theme-palette"></div>
  </header>
  <div id="example-picker" class="example-picker"></div>
  <main>
    <div id="editor-wrapper">
      <div id="editor"></div>
      <div id="math-panel"></div>
    </div>
  </main>
  <script src="demo.bundle.js"></script>
</body>
</html>
